<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        #container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DeviceOrientationControls.js"></script>

    <script>
        let scene, camera, renderer, cube;
        let controls;
        let mouseX = 0, mouseY = 0;
        let currentRotationY = 0, currentRotationX = 0;
        let videos = [];
        let videoTextures = [];
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let usingSensors = false;

        const VIDEO_PATH = 'Composition3.mp4';

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(20, 20, 20);

            const materials = [];
            for (let i = 0; i < 6; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                let hue = i * 60;
                setInterval(() => {
                    hue = (hue + 1) % 360;
                    ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }, 50);

                const texture = new THREE.CanvasTexture(canvas);
                videoTextures.push(texture);

                materials.push(new THREE.MeshBasicMaterial({
                    map: texture,
                    side: THREE.BackSide
                }));
            }

            cube = new THREE.Mesh(geometry, materials);
            scene.add(cube);

            scene.add(new THREE.AmbientLight(0xffffff, 1));

            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('touchmove', onTouchMove, false);
            window.addEventListener('resize', onWindowResize, false);

            if (isMobile) setupDeviceOrientation();

            loadVideo();
            animate();
        }

        function loadVideo() {
            for (let i = 0; i < 6; i++) {
                const video = document.createElement('video');
                video.src = VIDEO_PATH;
                video.loop = true;
                video.muted = true;
                video.crossOrigin = 'anonymous';
                video.playsInline = true;

                video.addEventListener('loadedmetadata', () => {
                    video.currentTime = (i * 2) % video.duration;
                    videos.forEach(v => v.play().catch(() => {}));
                });

                videos.push(video);

                const texture = new THREE.VideoTexture(video);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                videoTextures[i] = texture;

                cube.material[i].map = texture;
                cube.material[i].needsUpdate = true;
            }
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchMove(event) {
            if (event.touches.length > 0 && !usingSensors) {
                const touch = event.touches[0];
                mouseX = (touch.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function setupDeviceOrientation() {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {

                const askOnTap = async () => {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            controls = new THREE.DeviceOrientationControls(camera);
                            usingSensors = true;
                        }
                    } catch (e) {}
                    document.removeEventListener('touchstart', askOnTap);
                };
                document.addEventListener('touchstart', askOnTap);
            } else {
                controls = new THREE.DeviceOrientationControls(camera);
                usingSensors = true;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            cube.rotation.set(0, 0, 0);

            if (usingSensors) {
                controls.update();
            } else {
                const targetRotationY = -mouseX * Math.PI;
                const targetRotationX = mouseY * Math.PI * 0.5;

                currentRotationY += (targetRotationY - currentRotationY) * 0.1;
                currentRotationX += (targetRotationX - currentRotationX) * 0.1;

                camera.rotation.y = currentRotationY;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, currentRotationX));
                camera.rotation.z = 0;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
